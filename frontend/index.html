<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Puchi</title>
    <script src="https://meet.jit.si/external_api.js" async></script>
  </head>
  <body>
    <!-- Filtros SVG reutilizables — no ocupan espacio visual -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <!-- Unsharp mask: sharpening para imágenes AI que salen suaves -->
        <filter id="sharpen" color-interpolation-filters="linearRGB">
          <feConvolveMatrix
            order="3"
            kernelMatrix="0 -0.5 0  -0.5 3 -0.5  0 -0.5 0"
            divisor="1"
            bias="0"
            preserveAlpha="true"
          />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
