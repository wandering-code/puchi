services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://luni:luni@db:5432/luni
    depends_on:
      - db
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file:
      - ./backend/.env

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: luni
      POSTGRES_PASSWORD: luni
      POSTGRES_DB: luni
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
