services:
  backend:
    # Puerto externo distinto del de dev (8001 lo usa Vinted en el mini PC).
    # El puerto interno del contenedor se queda en 8001, sin tocar el código.
    ports:
      - "8002:8001"

  # db: sin entrada de puertos aquí — docker-compose.yml (base) ya no publica
  # ninguno (los de dev viven en docker-compose.override.yml, que no se carga
  # en producción). Nadie fuera del contenedor backend necesita hablar
  # directo con Postgres — mismo patrón que Sartori.
